<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki — SAP Sailing Analytics</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <style>
    :root {
      --blue:      #008fcc;
      --blue-dark: #006fa0;
      --yellow:    #efaa00;
      --dark:      #333333;
      --muted:     #666666;
      --border:    #e0e0e0;
      --surface:   #f8f8f8;
      --light:     #f6f9fc;
      --white:     #ffffff;
      --radius:    8px;
      --sidebar-w: 280px;
      --nav-h:     58px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Open Sans', system-ui, sans-serif;
      color: var(--dark);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── TOP NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200; height: var(--nav-h);
      background: linear-gradient(135deg, #006fa0 0%, #008fcc 45%, #0099d6 60%, #006fa0 100%);
      box-shadow: 0 2px 16px rgba(0,0,0,.22);
      display: flex; align-items: center; padding: 0 24px;
      gap: 16px;
    }
    .nav__logo img { height: 37px; }
    .nav__sep { width: 1px; height: 22px; background: rgba(255,255,255,.3); }
    .nav__title { font-size: .9rem; font-weight: 700; color: rgba(255,255,255,.9); }
    .nav__home {
      margin-left: auto; font-size: .8rem; font-weight: 600;
      color: rgba(255,255,255,.8); display: flex; align-items: center; gap: 6px;
      transition: color .15s;
    }
    .nav__home:hover { color: var(--white); text-decoration: none; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      border-right: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      padding: 16px 0 40px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar__search {
      margin: 0 12px 14px;
      display: flex; align-items: center; gap: 8px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 7px 12px;
    }
    .sidebar__search input {
      border: none; outline: none; font-size: .82rem;
      font-family: inherit; color: var(--dark); width: 100%; background: transparent;
    }
    .sidebar__search svg { color: var(--muted); flex-shrink: 0; }

    /* Group (collapsible) */
    .sg {
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .sg__hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px 8px 16px;
      cursor: pointer; user-select: none;
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
      transition: background .12s;
    }
    .sg__hdr:hover { background: rgba(0,143,204,.06); }
    .sg__hdr.open { color: var(--blue-dark); }
    .sg__arrow {
      font-size: .7rem; transition: transform .2s; color: var(--muted);
    }
    .sg__hdr.open .sg__arrow { transform: rotate(180deg); }
    .sg__body { display: none; }
    .sg__body.open { display: block; }

    .sidebar__item {
      display: block; padding: 5px 16px 5px 24px;
      font-size: .82rem; color: #444;
      transition: background .12s, color .12s;
      border-left: 3px solid transparent;
      line-height: 1.4;
    }
    .sidebar__item:hover { background: rgba(0,143,204,.07); color: var(--blue); text-decoration: none; }
    .sidebar__item.active {
      background: rgba(0,143,204,.1); color: var(--blue);
      border-left-color: var(--blue); font-weight: 600;
    }

    /* ── CONTENT (full-width) ── */
    .content {
      flex: 1; min-width: 0;
      padding: 36px 56px 80px;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: .78rem; color: var(--muted); margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--blue); }
    .breadcrumb span { color: var(--muted); }

    /* ── MARKDOWN STYLES ── */
    .markdown { max-width: 900px; }
    .markdown h1 { font-size: 2rem; font-weight: 800; color: var(--dark); margin-bottom: 16px; line-height: 1.2; }
    .markdown h2 {
      font-size: 1.35rem; font-weight: 700; color: var(--dark);
      margin: 36px 0 12px; padding-bottom: 8px;
      border-bottom: 2px solid var(--yellow);
    }
    .markdown h3 { font-size: 1.05rem; font-weight: 700; color: var(--dark); margin: 24px 0 8px; }
    .markdown h4 { font-size: .95rem; font-weight: 700; color: var(--dark); margin: 18px 0 6px; }
    .markdown p { color: #444; line-height: 1.75; margin-bottom: 14px; }
    .markdown ul, .markdown ol { padding-left: 24px; margin-bottom: 14px; }
    .markdown li { color: #444; line-height: 1.7; margin-bottom: 4px; }
    .markdown li::marker { color: var(--blue); }
    .markdown a { color: var(--blue); }
    .markdown strong { color: var(--dark); }
    .markdown blockquote {
      border-left: 4px solid var(--yellow); margin: 16px 0;
      padding: 10px 18px; background: #fffdf0; border-radius: 0 var(--radius) var(--radius) 0;
    }
    .markdown blockquote p { color: #555; margin: 0; }
    .markdown code {
      background: #f0f4f8; border: 1px solid #dde3ea;
      border-radius: 4px; padding: 1px 6px;
      font-family: 'JetBrains Mono', monospace; font-size: .82em; color: #c7254e;
    }
    .markdown pre {
      background: #1e2433; border-radius: var(--radius);
      padding: 20px 24px; margin: 16px 0; overflow-x: auto;
    }
    .markdown pre code {
      background: none; border: none; padding: 0;
      color: #e2e8f0; font-size: .85rem; line-height: 1.7;
    }
    .markdown table {
      width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .875rem;
    }
    .markdown th {
      background: var(--blue); color: var(--white);
      padding: 10px 14px; text-align: left; font-weight: 700; font-size: .8rem;
    }
    .markdown td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: #444; }
    .markdown tr:nth-child(even) td { background: var(--surface); }
    .markdown img { max-width: 100%; border-radius: var(--radius); margin: 12px 0; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    .markdown hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* ── LOADING / ERROR ── */
    .status {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 24px; text-align: center;
      gap: 16px;
    }
    .status__icon { font-size: 3rem; }
    .status h2 { font-size: 1.3rem; color: var(--dark); }
    .status p { color: var(--muted); max-width: 420px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { padding: 24px 20px 60px; }
    }
  </style>
</head>

  // ── Marked setup ──────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true });
  const renderer = new marked.Renderer();
  renderer.code = function(code, lang) {
    const language = lang && hljs.getLanguage(lang) ? lang : null;
    const highlighted = language
      ? hljs.highlight(typeof code === 'object' ? code.text : code, { language }).value
      : hljs.highlightAuto(typeof code === 'object' ? code.text : code).value;
    return `<pre><code class="hljs">${highlighted}</code></pre>`;
  };
  renderer.link = function(href, title, text) {
    if (typeof href === 'object') { title = href.title; text = href.text || text; href = href.href; }
    const t = title ? ` title="${title}"` : '';
    if (href && href.endsWith('.md') && !href.startsWith('http')) {
      const clean = href.replace(/^\.\.\//, '').replace(/^\.\//, '').replace(/\.md$/, '');
      return `<a href="wiki.html?page=${clean}"${t}>${text}</a>`;
    }
    const ext = href && !href.startsWith('http') ? '' : ' target="_blank" rel="noopener"';
    return `<a href="${href || '#'}"${t}${ext}>${text}</a>`;
  };
  marked.use({ renderer });

  // ── Sidebar build (collapsible groups) ───────────────────────────────────
  function buildSidebar(currentPath) {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    // Find which group contains the current page so it can start open
    const activeGroups = new Set();
    if (currentPath) {
      for (const grp of NAV) {
        if (grp.pages.some(p => p.path === currentPath)) {
          activeGroups.add(grp.id);
        }
      }
    }
    for (const grp of NAV) {
      const isOpen = activeGroups.has(grp.id) || (!currentPath && grp.id === 'gs');
      const sg = document.createElement('div');
      sg.className = 'sg';
      sg.dataset.group = grp.id;
      const hdr = document.createElement('div');
      hdr.className = 'sg__hdr' + (isOpen ? ' open' : '');
      hdr.innerHTML = `<span>${grp.group}</span><span class="sg__arrow">▼</span>`;
      hdr.onclick = function() { toggleGroup(hdr); };
      const body = document.createElement('div');
      body.className = 'sg__body' + (isOpen ? ' open' : '');
      body.dataset.gid = grp.id;
      for (const page of grp.pages) {
        const a = document.createElement('a');
        a.className = 'sidebar__item' + (page.path === currentPath ? ' active' : '');
        a.textContent = page.label;
        a.href = 'wiki.html?page=' + page.path;
        a.dataset.label = page.label.toLowerCase();
        a.dataset.path = page.path;
        body.appendChild(a);
      }
      sg.appendChild(hdr);
      sg.appendChild(body);
      nav.appendChild(sg);
    }
  }

  function toggleGroup(hdr) {
    hdr.classList.toggle('open');
    hdr.nextElementSibling.classList.toggle('open');
  }

  function filterSidebar(q) {
    q = q.toLowerCase().trim();
    if (!q) {
      // restore: only active group open
      document.querySelectorAll('.sg__body').forEach(b => {
        const wasOpen = b.querySelector('.sidebar__item.active') !== null;
        b.classList.toggle('open', wasOpen);
        b.previousElementSibling.classList.toggle('open', wasOpen);
        b.querySelectorAll('.sidebar__item').forEach(a => a.style.display = '');
      });
      return;
    }
    document.querySelectorAll('.sg__body').forEach(b => {
      let anyMatch = false;
      b.querySelectorAll('.sidebar__item').forEach(a => {
        const match = a.dataset.label.includes(q) || a.dataset.path.includes(q);
        a.style.display = match ? '' : 'none';
        if (match) anyMatch = true;
      });
      b.classList.toggle('open', anyMatch);
      b.previousElementSibling.classList.toggle('open', anyMatch);
    });
  }

  // ── Breadcrumb build ──────────────────────────────────────────────────────
  function buildBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    const parts = path.split('/');
    const labels = { howto: 'How-to', info: 'Info', misc: 'Misc', tutorials: 'Tutorials',
                     sailinganalytics: 'Sailing Analytics', sailinsight: 'Sail Insight',
                     sailingracemanager: 'Race Manager', development: 'Development',
                     mobile: 'Mobile', security: 'Security', eventmanagers: 'Event Managers',
                     setup: 'Setup', webserver: 'Web Server', api: 'API', landscape: 'Landscape',
                     general: 'General', paris2024: 'Paris 2024', tokyo2020: 'Tokyo 2020' };
    bc.innerHTML = '';
    const home = document.createElement('a');
    home.href = 'index.html'; home.textContent = 'Home';
    bc.appendChild(home);
    addSep(bc);
    const wikiLink = document.createElement('a');
    wikiLink.href = 'wiki.html'; wikiLink.textContent = 'Wiki';
    bc.appendChild(wikiLink);
    parts.forEach((p, i) => {
      addSep(bc);
      const span = document.createElement('span');
      if (i === parts.length - 1) {
        span.style.color = 'var(--dark)'; span.style.fontWeight = '600';
        span.textContent = titleCase(p.replace(/-/g, ' '));
      } else {
        span.textContent = labels[p] || titleCase(p);
      }
      bc.appendChild(span);
    });
  }
  function addSep(bc) {
    const sep = document.createElement('span'); sep.textContent = '/'; bc.appendChild(sep);
  }
  function titleCase(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }

  // ── Load page ─────────────────────────────────────────────────────────────
  const REPO_RAW = 'https://wiki.sapsailing.com/wiki/';

  function showLoading() {
    document.getElementById('content-area').innerHTML =
      '<div class="status"><div class="spinner"></div><p>Loading…</p></div>';
  }
  function showError(path) {
    document.getElementById('content-area').innerHTML = `
      <div class="status">
        <div class="status__icon">📄</div>
        <h2>Page not found</h2>
        <p>The page <code>${path}</code> could not be loaded from the wiki server.</p>
        <p style="margin-top:8px;">
          <a href="https://github.com/SAP/sailing-analytics/tree/main/wiki" target="_blank" rel="noopener">Browse all wiki files on GitHub →</a>
        </p>
      </div>`;
  }
  function showIndex() {
    document.getElementById('breadcrumb').innerHTML =
      '<a href="index.html">Home</a> <span>/</span> <span style="color:var(--dark);font-weight:600">Wiki</span>';
    document.getElementById('content-area').innerHTML = `
      <div class="markdown">
        <h1>SAP Sailing Analytics Wiki</h1>
        <p>Welcome to the project documentation. Choose a topic from the sidebar, or start with the onboarding guide.</p>
        <h2>Popular pages</h2>
        <ul>
          <li><a href="wiki.html?page=howto/onboarding">Developer Onboarding</a> — first stop for contributors</li>
          <li><a href="wiki.html?page=howto/glossary">Sailing Glossary</a> — sailing terminology explained</li>
          <li><a href="wiki.html?page=howto/tutorials/home">App Tutorials</a> — all tutorials in one place</li>
          <li><a href="wiki.html?page=howto/development/super-dev-mode">GWT Super Dev Mode</a> — fast front-end iteration</li>
          <li><a href="wiki.html?page=howto/tutorials/sailinganalytics/create-regattas">Create Regattas</a> — event management walkthrough</li>
          <li><a href="wiki.html?page=howto/tutorials/sailinganalytics/data-mining-tool">Data Mining Tool</a> — race analytics deep-dive</li>
        </ul>
      </div>`;
  }

  async function loadPage(path) {
    showLoading();
    buildSidebar(path);
    buildBreadcrumb(path);
    document.title = titleCase(path.split('/').pop().replace(/-/g, ' ')) + ' — SAP Sailing Analytics Wiki';
    try {
      const res = await fetch(REPO_RAW + path + '.md');
      if (!res.ok) { showError(path); return; }
      const md = await res.text();
      const html = marked.parse(md);
      document.getElementById('content-area').innerHTML = `<article class="markdown">${html}</article>`;
      window.scrollTo({ top: 0 });
    } catch (e) {
      showError(path);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    const params = new URLSearchParams(location.search);
    const page = params.get('page');
    buildSidebar(page || '');
    if (!page) { showIndex(); return; }
    loadPage(page);
  }

  init();
</script>
</body>
</html>
