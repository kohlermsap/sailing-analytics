MasterUnavailableMailSubject=Primærserver for replikasæt {0} midlertidigt utilgængelig
MasterUnavailableMailBody=Primærserveren for replikasæt {0} er midlertidig utilgængelig.\nÆndring af adgang suspenderes.\nÆndringer foretaget af et replika sættes i kø og anvendes, når den primære server er tilgængelig igen.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
MasterAvailableMailSubject=Primærserver for replikasæt {0} er tilgængelig igen
MasterAvailableMailBody=Primærserveren for replikasæt {0} er tilgængelig igen.\nÆndring af adgang er mulig igen.\nÆndringer, der er sat i kø, behandles nu.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
StartingNewArchiveCandidateSubject=Starter ny {0}-kandidat
StartingNewArchiveCandidateBody=Starter ny {0}-kandidat.\nFørst indlæses arkiveret indhold fra MongoDB. Efterfølgende beregnes vindestimeringer og mærkerundinger.\nHele processen kan tage op til to dage.\nDu modtager en ny e-mail, når denne fase er afsluttet.\nKontroller også kandidatens status på https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=Ny {0}-server er live
NewArchiveServerLiveBody=Ny {0}-server er live.\nDu kan nu arkivere indhold til {0}.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
StartingToArchiveReplicaSetIntoSubject=Starter arkivering af et replikasæt til {0}
StartingToArchiveReplicaSetIntoBody=Starter arkivering af et replikasæt til {0}.\nMens dette pågår, skal du undgå at arkivere et andet replikasæt til samme arkiv {0}.\nEfter indholdet er importeret, sammenlignes det med originalen.\nDu bør modtage en anden e-mail, når dette er afsluttet.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, vis du ikke længere vil modtage disse meddelelser.
StartingToArchiveReplicaSetSubject=Starter arkivering af et replikasæt {0}
StartingToArchiveReplicaSetBody=Starter arkivering af et replikasæt {0}.\nMens dette pågår, må du ikke foretage nogen ændringer af {0}.\nDu vil modtage en anden e-mail, når denne proces er afsluttet.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
FinishedToArchiveReplicaSetIntoSubject=Arkivering af et replikasæt til {0} er afsluttet
FinishedToArchiveReplicaSetIntoBody=Arkivering af et replikasæt til {0} er afsluttet.\nDu kan nu arkivere andet indhold til {0}, hvis du ønsker dette.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
FinishedToArchiveReplicaSetSubject=Arkivering af et replikasæt {0} er afsluttet
FinishedToArchiveReplicaSetBody=Arkivering af et replikasæt {0} er afsluttet.\nHvis du har anmodet om dette, er det oprindelige replikasæt fjernet.\n\nDu modtager denne e-mail, fordi du har administrationsrettigheder til {0}.\nFjern disse rettigheder på <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>, hvis du ikke længere vil modtage disse meddelelser.
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=Den nye {0}-kandidat er klar til stikprøvekontrol
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Vi har kørt følgende kontroller:\n{3}.\nDen nye {0}-kandidat er klar til stikprøvekontroller, og hvis OK, er rotationen klar til at blive den nye produktion {0}.\nKør dine stikprøvekontroller på <https://{1}/gwt/Home.html#EventsPlace:>, og sammenlign med <https://{2}/gwt/Home.html#EventsPlace:>.\nStart rotationen til den nye produktionsserver på <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:> efter fuldførte kontroller.
NewArchiveCandidateFailedSubject=Kontrollen af {1} mislykkedes under opstart af {0}
NewArchiveCandidateFailedBody=Kontrollen "{1}" mislykkedes med meddelelsen "{2}" under opstart af {0}. Kontroller landskabet, og ret manuelt.
