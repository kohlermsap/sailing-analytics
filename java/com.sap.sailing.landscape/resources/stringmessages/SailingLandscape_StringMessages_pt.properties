MasterUnavailableMailSubject=Servidor principal de conjunto de réplicas {0} temporariamente indisponível
MasterUnavailableMailBody=O servidor principal do conjunto de réplicas {0} está temporariamente indisponível.\nA modificação do acesso será suspensa.\nAs modificações efetuadas por uma réplica serão colocadas em fila e serão aplicadas quando o principal estiver novamente disponível.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
MasterAvailableMailSubject=Servidor principal de conjunto de réplicas {0} disponível novamente
MasterAvailableMailBody=O servidor principal do conjunto de réplicas {0} está disponível novamente.\nA modificação do acesso é novamente possível.\nAs modificações em fila serão processadas agora.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace: se você não quiser mais receber estas mensagens.
StartingNewArchiveCandidateSubject=Iniciando novo candidato {0} 
StartingNewArchiveCandidateBody=Iniciando novo candidato {0} .\nPrimeiro, o conteúdo arquivado é carregado do MongoDB; em seguida, as estimativas de vento e passagens de marca são calculadas.\nTodo o processo pode levar até dois dias.\nVocê receberá outro e-mail quando esta fase estiver concluída.\nVerifique também o status do candidato em https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=O novo servidor {0} está ativo
NewArchiveServerLiveBody=O novo servidor {0} está ativo.\nVocê pode agora arquivar conteúdo para {0}.\n\nocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
StartingToArchiveReplicaSetIntoSubject=Começando a arquivar um conjunto de réplicas para {0}
StartingToArchiveReplicaSetIntoBody=Começando a arquivar um conjunto de réplicas para {0}.\nEnquanto isto estiver acontecendo, evite arquivar outro conjuntos de réplicas no mesmo arquivo. {0}.\nApós a importação do conteúdo, ele será comparado com o original.\nVocê deve receber outro e-mail quando isto tiver sido concluído.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
StartingToArchiveReplicaSetSubject=Começando a arquivar um conjunto de réplicas {0}
StartingToArchiveReplicaSetBody=Começando a arquivar um conjunto de réplicas {0}.\nEnquanto isto estiver em andamento, não efetue modificações em {0}.\nVocê irá receber outro e-mail quando este processo estiver concluído.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
FinishedToArchiveReplicaSetIntoSubject=Arquivamento de um conjunto de réplicas para {0} concluído
FinishedToArchiveReplicaSetIntoBody=O arquivamento de um conjunto de réplicas para {0} foi concluído.\nVocê pode agora arquivar outro conteúdo para {0} se quiser.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
FinishedToArchiveReplicaSetSubject=Arquivamento de conjunto de réplicas {0} concluído
FinishedToArchiveReplicaSetBody=O arquivamento de conjunto de réplicas {0} foi concluído.\nSe você tiver solicitado, o conjunto de réplicas original terá sido removido.\n\nVocê está recebendo este correio porque tem permissões administrativas para {0}.\nRemova essas permissões em <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se você não quiser mais receber estas mensagens.
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=O novo candidato {0} está pronto para verificações pontuais
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Executamos as seguintes verificações:\n{3}.\nO novo candidato {0} está pronto para verificações pontuais e, se OK, rotação para se tornar o novo {0} de produção.\nExecute suas verificações pontuais em <https://{1}/gwt/Home.html#EventsPlace:> e compare com <https://{2}/gwt/Home.html#EventsPlace:>.\nInicie a rotação para o novo servidor de produção em <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:> após verificações com êxito.
NewArchiveCandidateFailedSubject=A verificação {1} falhou durante a inicialização {0}
NewArchiveCandidateFailedBody=A verificação "{1}" falhou com a mensagem "{2}" ao inicializar {0}. Verifique a estrutura e corrija manualmente.
