MasterUnavailableMailSubject=Primarni strežnik niza replik{0} začasno ni na voljo
MasterUnavailableMailBody=Primarni strežnik niza replik{0} začasno ni na voljo\nSpreminjanje dostopa bo odloženo.\nSpremembe, izvedene z repliko, bodo postavljene v čakalno vrsto in se bodo uporabile, ko bo primarni strežnik spet na voljo.\n\nTo elektronsko sporočilo ste prejeli, ker imate upraviteljska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
MasterAvailableMailSubject=Primarni strežnik niza replik {0} je znova na voljo
MasterAvailableMailBody=Primarni strežnik niza replik {0} je znova na voljo.\nSpreminjanje dostopa je znova omogočeno.\nSpremembe v čakalni vrsti bodo zdaj obdelane.\n\nTo elektronsko sporočilo ste prejeli, ker imate upraviteljska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace.
StartingNewArchiveCandidateSubject=Zagon novega kandidata za {0}
StartingNewArchiveCandidateBody=Zagon novega kandidata za {0} .\nNajprej se iz podatkovne baze MongoDB prenese arhivirana vsebina; nato se izračunajo predvidene smeri vetra in vožnja mimo oznak.\nCeloten postopek lahko traja do dva dni.\nKo se ta faza konča, boste prejeli še eno e-pošto.\nPreverite tudi status kandidata na https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=Novi strežnik {0} je v proizvodnji
NewArchiveServerLiveBody=Novi strežnik {0} je v proizvodnji.\nVsebino lahko zdaj arhivirate v {0}.\n\nTo elektronsko sporočilo ste prejeli, ker imate upravljavska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
StartingToArchiveReplicaSetIntoSubject=Začetek arhiviranja niza replik v {0}
StartingToArchiveReplicaSetIntoBody=Začetek arhiviranja niza replik v {0}.\nMed tem postopkom ne arhivirajte drugega niza replik v isti arhiv {0}.\nPo uvozu vsebine se bo ta primerjala z izvirnikom.\nPo končanem postopku bi morali prejeti še eno elektronsko sporočilo.\nTo elektronsko sporočilo ste prejeli, ker imate upravljavska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
StartingToArchiveReplicaSetSubject=Začetek arhiviranja niza replik {0}
StartingToArchiveReplicaSetBody=Začetek arhiviranja niza replik {0}.\nMed tem postopkom ne izvajajte nobenih sprememb v {0}.\nPo koncu tega postopka boste prejeli še eno elektronsko sporočilo.\n\To elektronsko sporočilo ste prejeli, ker imate upravljavska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
FinishedToArchiveReplicaSetIntoSubject=Arhiviranje niza replik nastavljeno na {0} dokončano
FinishedToArchiveReplicaSetIntoBody=Arhiviranje niza replik v {0} je končano.\nČe želite, lahko zdaj arhivirate drugo vsebino v {0}.\n\nTo elektronsko sporočilo ste prejeli, ker imate upravljavska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
FinishedToArchiveReplicaSetSubject=Arhiviranje niza replik {0} je končano
FinishedToArchiveReplicaSetBody=Arhiviranje niza replik v {0} je končano.\nČe ste to zahtevali, je bil izvirni replik odstranjen.\n\nTo elektronsko sporočilo ste prejeli, ker imate upravljavska dovoljenja za {0}.\nČe teh sporočil ne želite več prejemati, odstranite ta dovoljenja na <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>.
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=Novi kandidat za {0} je pripravljen na preglede
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Izvedeni so naslednji pregledi:\n{3}.\nNovi kandidat za {0} je pripravljen za preglede in v primeru ustreznosti za rotacijo v proizvodnjo kot novi {0}.\nIzvedite preglede na <https://{1}/gwt/Home.html#EventsPlace:> in jih primerjajte z <https://{2}/gwt/Home.html#EventsPlace:>.\nPo uspešnih pregledih zaženite rotacijo v novi proizvodni strežnik na <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:>.
NewArchiveCandidateFailedSubject=Preverjanje {1} ni uspelo med zagonom {0}
NewArchiveCandidateFailedBody=Preverjanje "{1}" ni uspelo s sporočilom "{2}" med zagonom {0}. Preverite infrastrukturo in ročno popravite.
