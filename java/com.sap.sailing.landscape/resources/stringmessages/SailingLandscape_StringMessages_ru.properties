MasterUnavailableMailSubject=Первичный сервер набора реплик {0} временно недоступен
MasterUnavailableMailBody=Первичный сервер набора реплик {0} временно недоступен.\nДоступ для изменения приостановлен.\nИзменения, внесенные репликой, будут поставлены в очередь и применены, когда первичный сервер будет доступен.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
MasterAvailableMailSubject=Первичный сервер набора реплик {0} снова доступен
MasterAvailableMailBody=Первичный сервер набора реплик {0} снова недоступен.\nДоступ для изменения открыт.\nИзменения в очереди будут обработаны.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:
StartingNewArchiveCandidateSubject=Запуск нового кандидата {0}
StartingNewArchiveCandidateBody=Выполняется запуск нового кандидата {0}.\nСначала архивированный контент загружается из MongoDB; затем рассчитываются оценки ветра и прохождения отметок.\nВесь процесс может занять до двух дней.\nПо завершении этой фазы вы получите еще одно сообщение по электронной почте.\nТакже проверьте статус кандидата на странице: https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=Запущен новый сервер {0}
NewArchiveServerLiveBody=Запущен новый сервер {0}.\nТеперь при необходимости можно архивировать контент в {0}.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
StartingToArchiveReplicaSetIntoSubject=Запущена архивация набора реплик в {0}
StartingToArchiveReplicaSetIntoBody=Запущена архивация набора реплик в {0}.\nПока этот процесс выполняется, не архивируйте другой набор реплик в тот же архив {0}.\nПосле импорта будет выполнено сравнение контента с оригиналом.\nПо завершении процесса вы получите еще одно письмо.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
StartingToArchiveReplicaSetSubject=Запущена архивация набора реплик {0}
StartingToArchiveReplicaSetBody=Запущена архивация набора реплик {0}.\nПока этот процесс выполняется, не вносите изменения в {0}.\nПосле импорта будет выполнено сравнение контента с оригиналом.\nПо завершении процесса вы получите еще одно письмо.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
FinishedToArchiveReplicaSetIntoSubject=Завершена архивация набора реплик {0}
FinishedToArchiveReplicaSetIntoBody=Завершена архивация набора реплик в {0}.\nТеперь при необходимости можно архивировать другой контент в {0}.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
FinishedToArchiveReplicaSetSubject=Завершена архивация набора реплик {0}
FinishedToArchiveReplicaSetBody=Завершена архивация набора реплик {0}.\nИсходный набор реплик был удален, если вы запросили удаление.\n\nВы получили это письмо, поскольку имеете полномочия администратора для {0}.\nЕсли вы больше не хотите получать эти письма, отмените свои полномочия на странице https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> .
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=Новый кандидат {0} готов к выборочным проверкам
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Выполнены следующие проверки:\n{3}.\nНовый кандидат {0} готов к выборочным проверкам и, если все в порядке, к переводу в производство {0}.\nВыполните выборочные проверки по адресу <https://{1}/gwt/Home.html#EventsPlace:> и выполните сравнение с <https://{2}/gwt/Home.html#EventsPlace:>.\nПосле успешных проверок запустите переход на новый продуктивный сервер по адресу <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:> .
NewArchiveCandidateFailedSubject=Проверка {1} не удалась при запуске {0}
NewArchiveCandidateFailedBody=Проверка "{1}" не удалась (сообщение: "{2}") при запуске {0}. Проверьте ландшафт и исправьте вручную.
