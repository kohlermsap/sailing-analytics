MasterUnavailableMailSubject=複製セット {0} のプライマリサーバが一時的に利用不可
MasterUnavailableMailBody=複製セット {0} のプライマリサーバが一時的に利用できません。\n修正アクセスは中断されます。\n複製によって発生した修正はキューで待機し、プライマリサーバが再び利用できるようになったときに適用されます。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
MasterAvailableMailSubject=複製セット {0} のプライマリサーバが再び利用可能
MasterAvailableMailBody=複製セット {0} のプライマリサーバが再び利用できるようになりました。\n修正アクセスが再び可能になっています。\nキューで待機していた修正がこれで処理されることになります。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace でそれらの権限を削除してください。
StartingNewArchiveCandidateSubject=新規 {0} 候補の開始
StartingNewArchiveCandidateBody=新規 {0} 候補の開始。\n最初に、アーカイブされたコンテンツが MongoDB からロードされます。その後、風推定およびマーク通過が計算されます。\nプロセス全体には最大 2 日かかる場合があります。\nこのフェーズが終了すると、別の電子メールが送信されてきます。\nhttps://archive-canidate.sapsailing.com/gwt/status で候補のステータスも確認してください。
NewArchiveServerLiveSubject=新規 {0} サーバが有効
NewArchiveServerLiveBody=新規 {0} サーバが有効。\nこれで、コンテンツを {0} にアーカイブできるようになります。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
StartingToArchiveReplicaSetIntoSubject=複製セットの {0} へのアーカイブを開始
StartingToArchiveReplicaSetIntoBody=複製セットの {0} へのアーカイブを開始しています。\nこれを実行している間は、同じアーカイブ {0} に別の複製セットをアーカイブすることはお控えください。\nコンテンツは、インポートされた後にオリジナルと比較されます。\nこれが完了すると、別のメールが送信されてくることになります。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
StartingToArchiveReplicaSetSubject=複製セット {0} のアーカイブを開始
StartingToArchiveReplicaSetBody=複製セット {0} のアーカイブを開始しています。\nこれを実行している間は、{0} に何も修正を加えないようにしてください。\nこのプロセスが終了すると、別のメールが送信されてきます。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
FinishedToArchiveReplicaSetIntoSubject=複製セットの {0} へのアーカイブが終了
FinishedToArchiveReplicaSetIntoBody=複製セットの {0} へのアーカイブが終了しました。\nこれで、必要であれば他のコンテンツを {0} にアーカイブできるようになります。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
FinishedToArchiveReplicaSetSubject=複製セット {0} のアーカイブが終了
FinishedToArchiveReplicaSetBody=複製セット {0} のアーカイブが終了しました。\nそのように依頼している場合には、オリジナルの複製セットは削除されています。\n\nこのメールを受信しているのは、{0} の管理権限をお持ちであるためです。\nこれらのメッセージをもう受信しないようにするには、<https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> でそれらの権限を削除してください。
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=新規 {0} 候補のスポットチェックの準備が完了
NewArchiveCandidateReadyForSpotChecksAndRotationBody=以下のチェックが実行されました:\n{3}。\n新規 {0} 候補はスポットチェックの準備が完了しており、OK の場合は、ローテーションして新規本稼動 {0} になります。\nスポットチェックを <https://{1}/gwt/Home.html#EventsPlace:> で実行し、<https://{2}/gwt/Home.html#EventsPlace:> と比較します。\nチェックが正常に終了した後、<{4}/gwt/AdminConsole.html#LandscapeManagementPlace:> で新規本稼動サーバへのローテーションを開始します。
