MasterUnavailableMailSubject=Server primario del set di replica {0} temporaneamente non disponibile
MasterUnavailableMailBody=Il server primario del set di replica {0} è temporaneamente non disponibile.\nL''accesso di modifica sarà sospeso.\nLe modifiche di una replica verranno messe in coda e verranno applicate quando il server primario sarà nuovamente disponibile.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo: <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:>: se non si desidera ricevere più questi messaggi.
MasterAvailableMailSubject=Server primario del set di replica {0} nuovamente disponibile
MasterAvailableMailBody=Il server primario del set di replica {0} è nuovamente disponibile.\nL''accesso di modifica è nuovamente possibile.\nLe modifiche in coda verranno ora elaborate.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni in https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace: se non si desidera ricevere più questi messaggi.
StartingNewArchiveCandidateSubject=Avvio del nuovo candidato {0}
StartingNewArchiveCandidateBody=Avvio del nuovo candidato {0} .\nInnanzitutto, il contenuto archiviato viene caricato da MongoDB; successivamente vengono calcolate le stime del vento e i passaggi del segnale.\nL''intero processo può richiedere fino a due giorni.\nAl termine di questa fase si riceverà un''altra e-mail.\nControllare anche lo stato del candidato all''indirizzo https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=Il nuovo server {0} è attivo
NewArchiveServerLiveBody=Il nuovo server {0} è attivo.\nOra è possibile archiviare contenuti in {0}.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se non si desidera ricevere più questi messaggi.
StartingToArchiveReplicaSetIntoSubject=Avvio dell''archiviazione di un set di replica in {0}
StartingToArchiveReplicaSetIntoBody=Avvio dell''archiviazione di un set di replica in {0}.\nDurante questa operazione, evitare di archiviare un altro set di replica nello stesso archivio {0}.\nDopo che il contenuto è stato importato, verrà confrontato con l''originale.\nSi riceverà un''altra e-mail al completamento dell''operazione.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se non si desidera ricevere più questi messaggi.
StartingToArchiveReplicaSetSubject=Avvio dell''archiviazione del set di replica {0}
StartingToArchiveReplicaSetBody=Avvio dell''archiviazione di un set di replica {0}.\nDurante questa operazione, non apportare alcuna modifica a {0}.\nSi riceverà un''altra e-mail al completamento di questo processo.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se non si desidera ricevere più questi messaggi.
FinishedToArchiveReplicaSetIntoSubject=Archiviazione di un set di replica in {0} completata
FinishedToArchiveReplicaSetIntoBody=L''archiviazione di un set di replica su {0} è stata completata.\nSe si desidera, è ora possibile archiviare altro contenuto in {0}.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se non si desidera ricevere più questi messaggi.
FinishedToArchiveReplicaSetSubject=Archiviazione di un set di replica {0} completata
FinishedToArchiveReplicaSetBody=L''archiviazione di un set di replica {0} è stata completata.\nSe richiesto, il set di replica originale è stato rimosso.\n\nSi riceve questa e-mail perché si dispone di autorizzazioni amministrative per {0}.\nRimuovere queste autorizzazioni all''indirizzo <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace:> se non si desidera ricevere più questi messaggi.
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=Il nuovo candidato {0} è pronto per i controlli a campione
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Sono stati eseguiti i seguenti controlli:\n{3}.\nIl nuovo candidato {0} è pronto per i controlli a campione e, se li supera, inizierà la rotazione per diventare il nuovo {0} di produzione .\nEseguire i controlli a campione all''indirizzo <https://{1}/gwt/Home.html#EventsPlace:> e confrontarli con <https://{2}/gwt/Home.html#EventsPlace:>.\nAvviare la rotazione al nuovo server di produzione all''indirizzo <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:> dopo aver eseguito correttamente i controlli.
NewArchiveCandidateFailedSubject=Controllo {1} non riuscito durante l’avvio di {0}
NewArchiveCandidateFailedBody=Il controllo "{1}" non è riuscito con il messaggio "{2}" durante l''avvio di {0}. Controllare l''infrastruttura e correggere l’errore manualmente.
