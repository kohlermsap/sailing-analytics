MasterUnavailableMailSubject=Serveur principal de l''ensemble de réplicas {0} temporairement indisponible
MasterUnavailableMailBody=Le serveur principal de l''ensemble de réplicas {0} est temporairement indisponible.\nLa modification de l''accès sera interrompue.\nLes modifications entraînées par un réplica seront mises en file d''attente et seront appliquées lorsque le serveur principal sera de nouveau disponible.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations via le lien <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
MasterAvailableMailSubject=Serveur principal de l''ensemble de réplicas {0} de nouveau disponible
MasterAvailableMailBody=Le serveur principal de l''ensemble de réplicas {0} est de nouveau disponible.\nLa modification de l''accès est de nouveau possible.\nLes modifications en file d''attente vont maintenant être traitées.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations sur https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace.
StartingNewArchiveCandidateSubject=Lancement d’un nouveau candidat {0}
StartingNewArchiveCandidateBody=Lancement d''un nouveau candidat {0}.\nTout d''abord, le contenu archivé est chargé à partir de MongoDB. Les estimations de vent et les passages de marques sont ensuite calculés.\nL''ensemble du processus peut prendre jusqu''à deux jours.\nVous recevrez un autre e-mail lorsque cette phase sera terminée.\nVérifiez également le statut du candidat via le lien https://archive-canidate.sapsailing.com/gwt/status
NewArchiveServerLiveSubject=Le nouveau serveur {0} est opérationnel.
NewArchiveServerLiveBody=Le nouveau serveur {0} est opérationnel.\nVous pouvez maintenant archiver du contenu dans {0}.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations via le lien <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
StartingToArchiveReplicaSetIntoSubject=Début de l''archivage d''un ensemble de réplicas dans {0}
StartingToArchiveReplicaSetIntoBody=Début de l''archivage d''un ensemble de réplicas dans {0}.\nPendant que cette opération est en cours, évitez d''archiver un autre ensemble de réplicas dans la même archive {0}.\nUne fois le contenu importé, il sera comparé à l''original.\nVous recevrez un autre e-mail lorsque cette opération sera terminée.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations via le lien <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
StartingToArchiveReplicaSetSubject=Début de l''archivage de l''ensemble de réplicas {0}
StartingToArchiveReplicaSetBody=Début de l''archivage de l''ensemble de réplicas {0}.\nPendant que cette opération est en cours, merci de ne pas apporter de modifications à {0}.\n Vous recevrez un autre e-mail lorsque ce processus sera terminé.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations sur <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
FinishedToArchiveReplicaSetIntoSubject=Archivage d''un ensemble de réplicas dans {0} terminé
FinishedToArchiveReplicaSetIntoBody=L''archivage d''un ensemble de réplicas dans {0} est terminé.\nVous pouvez maintenant archiver d''autres contenus dans {0} si vous le voulez.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations sur <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
FinishedToArchiveReplicaSetSubject=Archivage de l''ensemble de réplicas {0} terminé
FinishedToArchiveReplicaSetBody=L''archivage de l''ensemble de réplicas {0} est terminé.\nSi vous en avez fait la demande, l''ensemble de réplicas d''origine a été supprimé.\n\nVous recevez cet e-mail car vous disposez des autorisations de gestion pour {0}.\nSi vous ne voulez plus recevoir ces messages, retirez ces autorisations sur <https://sapsailing.com/gwt/AdminConsole.html#UserManagementPlace>.
NewArchiveCandidateReadyForSpotChecksAndRotationSubject=Le nouveau candidat {0} est prêt pour des contrôles ponctuels.
NewArchiveCandidateReadyForSpotChecksAndRotationBody=Nous avons exécuté les contrôles suivants :\n{3}.\nLe nouveau candidat {0} est prêt pour les contrôles ponctuels et, s''ils donnent de bons résultats, pour la rotation afin de devenir le nouvel élément {0} de production.\nEffectuez vos contrôles ponctuels via le lien <https://{1}/gwt/Home.html#EventsPlace:> et comparez-les à <https://{2}/gwt/Home.html#EventsPlace:>.\nSi les contrôles sont réussis, lancez la rotation vers le nouveau serveur de production via le lien <{4}/gwt/AdminConsole.html#LandscapeManagementPlace:>.
