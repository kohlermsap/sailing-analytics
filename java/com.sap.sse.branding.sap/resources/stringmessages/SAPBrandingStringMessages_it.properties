welcomeToSailingAnalyticsBody=SAP avvicina i fan della vela all''azione in acqua come mai prima. \ Le classifiche in tempo reale aumentano l''esperienza degli appassionati grazie alle posizioni in classifica in tempo reale, le informazioni sulla velocità delle barche e i margini di vittoria. Segui tutte le gare e non perderti una manovra di passaggio grazie a SAP. \ Il modo semplice per seguire le gare di vela ovunque ti trovi.
inSailingContent=Sailing rappresenta per SAP la piattaforma perfetta in cui presentare le proprie soluzioni e offrire un supporto senza precedenti alla gestione di questo sport. L’impegno di SAP in ambito sportivo ha trasformato l’esperienza velistica con strumenti capaci di:<ul><li>aiutare i velisti ad analizzare le prestazioni e ottimizzare le strategie</li><li>avvicinare i fan della vela all’azione</li><li>fornire informazioni e approfondimenti ai media per offrire un commento informato più dettagliato</li></ul>SAP è da lungo tempo impegnata nel mondo della vela, con un portafoglio di team e regate, tra cui:<ul><li>Partner tecnico delle European Sailing League</li><li>Partner della più grande regata del mondo, la Kieler Woche (Settimana di Kiel)</li><li>Partner tecnico della Sailing Champions League</li><li>Title sponsor delle SAP 5O5 World Championship</li><li>Partner tecnologico ufficiale del WORLD SAILING</li></ul>
