welcomeToSailingAnalyticsBody=SAP bringer sejlsportsfans tættere på det, der sker på vandet, end nogensiden før. Live-ranglisten forbedrer oplevelsen for fans med rangordninger i realtid, bådhastigheder og vindermarginer. Følg hver kapsejlads, og gå aldrig glip af en rundingsmanøvre med SAP. Det er den nemmeste måde at se sejlsport live, uanset hvor du er.
inSailingContent=Sailing er den perfekte platform for SAP til at fremvise løsninger og hjælpe sporten med at køre som aldrig før. SAP''s involvering i sporten har forvandlet sejladsoplevelsen ved at levere værktøjer, som:<ul><li>Hjælper sejlere med at analysere præstationer og optimere strategi</li><li>Bringer fans tættere på begivenhederne</li><li>Giver medierne oplysninger og analyser til at levere en mere informeret kommentering</li></ul>SAP har en mangeårig involvering i sejlads og har etableret en portefølje, der spænder over teams og regattaer, herunder:<ul><li>Teknisk partner for European Sailing Leagues</li><li>Partner i verdens største regatta, Kielerugen</li><li>Teknisk partner i Sailing Champions League</li><li>Hovedsponsor for SAP 5O5 World Championships</li><li>Officiel teknologipartner for WORLD SAILING</li></ul>
