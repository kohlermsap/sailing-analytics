welcomeToSailingAnalytics=Bem-vindo à SAP Sailing Analytics
welcomeToSailingAnalyticsBody=A SAP aproxima os fãs de vela da ação na água como nunca antes.\ O painel de classificação ao vivo intensifica a experiência dos fãs com classificações, velocidades de barcos e margens de vitória em tempo real. Siga todas as corridas e nunca perca uma manobra de passagem com a SAP.\ Esta é a forma simples de ver ao vivo regatas a vela onde quer que esteja.
inSailingContent=O Sailing oferece a plataforma perfeita para a SAP apresentar soluções e ajudar o esporte a operar como nunca antes. O envolvimento da SAP no esporte transformou a experiência de vela fornecendo ferramentas que:<ul><li>Ajude os marinheiros a analisar o desempenho e otimizar a estratégia</li><li>Aproxime os torcedores da ação</li><li>Forneça à mídia informações e insights para fornecer um comentário mais informado</li></ul>A SAP tem um envolvimento de longa data com a vela e estabeleceu um portfólio de spanning entre equipes e regatas, incluindo:<ul><li>Parceiro Técnico da Liga Europeia de Vela</li><li> Parceiro da maior regata do mundo, Kieler Woche (Semana de Kiel)</li><li>Parceiro Técnico da Liga dos Campeões de Vela</li><li>Patrocinador principal do Campeonato Mundial SAP 5O5</li><li>Parceiro de tecnologia oficial da WORLD SAILING</li></ul>
