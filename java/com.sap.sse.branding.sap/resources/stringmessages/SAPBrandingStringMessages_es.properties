welcomeToSailingAnalyticsBody=SAP lleva a los amantes de la navegación al corazón de la experiencia náutica.\ Con la tabla de clasificación en directo, los fans de las regatas podrán acceder en tiempo real a rankings, velocidades de embarcaciones y márgenes de victoria. Siga cada prueba con SAP y no se pierda ningún adelantamiento.\ Una manera sencilla de ver regatas en directo desde cualquier rincón del mundo.
inSailingContent=Sailing proporciona la plataforma perfecta para que SAP muestre soluciones y ayude a que el deporte funcione como nunca antes. La participación de SAP en el deporte ha transformado la experiencia de la vela proporcionando herramientas, que:<ul><li>Ayudan a los navegantes a analizar el rendimiento y optimizar la estrategia</li><li>Acercar a los aficionados a la acción</li><li>Proporcionar a los medios de comunicación información y conocimientos para ofrecer unos comentarios más fundamentados</li></ul>SAP tiene una larga participación en la vela y ha establecido un portafolio que abarca equipos y regatas, incluyendo:<ul><li>Socio Técnico de las Ligas Europeas de Vela </li><li>Socio de la regata más grande del mundo, la Kieler Woche (Semana de Kiel)</li><li>Socio técnico de la Sailing Champions League</li><li>Patrocinador principal del Campeonato Mundial SAP 5O5</li><li>Socio tecnológico oficial de la WORLD SAILING</li></ul>.
