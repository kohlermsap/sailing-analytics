welcomeToSailingAnalyticsBody=SAP позволяет любителям парусного спорта подойти к происходящему на воде ближе, чем когда-либо ранее.\ Онлайн-таблица лидеров содержит обновляемые в режиме реального времени данные о рангах участников, скоростях лодок и преимуществе лидеров. Следите за каждой гонкой и не пропустите ни одного маневра с SAP.\ Это удобный способ наблюдения за парусными гонками в реальном времени откуда угодно.
inSailingContent=Sailing – это идеальная платформа SAP для демонстрации решений и трансформации представления о спорте. Своими решениями SAP изменила парусный спорт, предоставив инструменты, которые:<ul><li>Помогают спортсменам анализировать эффективность и оптимизировать стратегию</li><li>Помогают болельщикам быть ближе к действию</li><li>Предоставляют больше информации и комментариев</li></ul>SAP давно участвует в парусном спорте и создала свое портфолио из команд и регатт:<ul><li>Технический партнер Европейской парусной лиги</li><li>Партнер крупнейшей мировой регаты в Киле (Кильская неделя)</li><li>Технический партнер Парусной лиги чемпионов Европы</li><li>Титульный спонсор чемпионата мира SAP 5O5</li><li>Официальный технологический партнер WORLD SAILING</li></ul>
