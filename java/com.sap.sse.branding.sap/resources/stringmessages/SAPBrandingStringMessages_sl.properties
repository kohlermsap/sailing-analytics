welcomeToSailingAnalyticsBody=SAP zbližuje privržence jadranja in dogajanje na vodi na način, kot ga še nismo videli. \ Lestvica vodilnih se osvežuje v živo in s sprotnim prikazom uvrstitev, hitrostmi jadrnic in zmagovalnimi razlikami zares obogati izkušnjo. SAP bo poskrbel, da ne boste zamudili nobenega plova in nobenega prehitevanja. \ Tako lahko tekmovanja v jadranju spremljate praktično povsod.
inSailingContent=Jadranje je za SAP idealna platforma, na kateri lahko predstavi svoje rešitve in pripomore k športu kot še nikoli prej. SAP-jeva udeležba v panogi je preoblikovala jadralno izkušnjo z zagotavljanjem orodij, ki:<ul><li>Pomagajo jadralcem analizirati zmogljivosti in optimizirati strategijo</li><li>Dogajanje približajo gledalcem</li><li>Medijem zagotavljajo informacije in vpoglede ter tako omogočajo še bolj informirano komentiranje</li></ul>SAP se na področju jadranja udejstvuje že vrsto let in je vzpostavil portfelj, ki zajema ekipe in regate ter vključuje:<ul><li>Tehnični partner evropskih jadralnih lig</li><li>Partner največje regate na svetu, Kieler Woche (Kielski teden)</li><li>Tehnični partner Sailing Champions League</li><li>Glavni sponzor svetovnih prvenstev SAP 5O5</li><li>Uradni tehnološki partner WORLD SAILING</li></ul>
