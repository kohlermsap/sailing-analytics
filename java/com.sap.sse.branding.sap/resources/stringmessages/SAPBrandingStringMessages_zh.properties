welcomeToSailingAnalyticsBody=SAP 使船赛粉丝得以近距离直击水上运动，史无前例。\\u5B9E况积分榜让粉丝全程了解最新排名、船速和输赢差距。使用 SAP 关注每场比赛轮次，绝不错过任何一个操作。\\u4E0D论您身在何地，这都是观看实况帆船比赛的简单方式。
inSailingContent=SAP 凭借此航行应用提供完美的平台，向用户展示解决方案，并以前所未有的顺畅速度呈现体育赛事。SAP 通过提供各种工具转换其在参与此项运动中获得的航行经验，这些工具：<ul><li>帮助水手分析表现并优化策略</li><li>让粉丝近距离直击运动</li><li>为媒体提供信息和见解，从而提供深度评论</li></ul>SAP 长期参与航行运动，并成立了跨越团队和比赛的组合，包括：<ul><li>欧洲帆船联盟的技术合作伙伴</li><li>世界上最大的帆船盛事“基尔周”的合作伙伴</li><li>帆船俱乐部冠军联赛的技术合作伙伴</li><li>SAP 5O5 世界锦标赛的冠名赞助商</li><li>世界帆船运动的官方技术合作伙伴</li></ul>
