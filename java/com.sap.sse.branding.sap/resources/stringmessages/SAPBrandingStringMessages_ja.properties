welcomeToSailingAnalyticsBody=SAP は、水上で行われている動きをセーリングファンにとってかつてないほど身近なものにします。\nこの実況リーダーボードでランキング、艇速、艇差をリアルタイムに把握してファンとしての体験を充実したものにできます。SAP を使ってすべてのレースを追いかければ、追い抜きのマニューバーを見逃すことはありません。\nこれこそ、セーリング競技を生で簡単に視聴する方法なのです。
inSailingContent=SAP Sailing は、SAP がソリューションを紹介し、スポーツの運営を今までになかったようなやり方で支援するためにうってつけのプラットフォームを提供します。スポーツに SAP が関与することで、以下のことを行うツールが提供されセーリングエクスペリエンスが変革されました。<ul><li>セーリング競技者がパフォーマンスを分析し、戦略を最適化できるよう支援する</li><li>アクションをファンにより身近なものにする</li><li>情報に基づくすばらしい解説ができるように情報やインサイトをメディアに提供する</li></ul>SAP は長年にわたってセーリングに関わってきており、以下のとおりチームおよびレガッタを横断したポートフォリオを確立しています。<ul><li>欧州セーリング連盟のテクニカルパートナー</li><li>世界最大のレガッタであるキーラー週間のパートナー</li><li>セーリングチャンピオンズリーグのテクニカルパートナー</li><li>SAP 5O5 ワールドチャンピオンシップのタイトルスポンサー</li><li>ワールドセーリングの公式テクノロジーパートナー</li></ul>
