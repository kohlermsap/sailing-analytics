welcomeToSailingAnalyticsBody=SAP přenese příznivce jachtařského sportu tak blízko vodní hladině jako nikdo předtím.\ Výsledková tabule přináší dokonalý přehled o aktuálním pořadí, rychlosti lodí a odstupech od vítěze. Díky SAP můžete být u každé rozjížďky a nikdy vám neunikne žádný předjížděcí manévr.\ Do ruky se vám dostává jednoduchý způsob, jak sledovat přímé přenosy jachtařských závodů, ať už jste kdekoli.
inSailingContent=Jachtařský sport je ideálním prostředím, v němž může SAP představit svá řešení a současně pomoci odvětví v dalším rozvoji. Svým vstupem do jachtařského sportu SAP toto sportovní odvětví proměnil díky nástrojům, které:<ul><li>pomáhají posádkám analyzovat výkonnost a optimalizovat strategii,</li><li>přinášejí fanouškům jedinečný zážitek,</li><li>nabízejí médiím informace a analytická data pro informovanější pokrytí.</li></ul>Společnost SAP se v jachtařském odvětví pohybuje již řadu let a za tu dobu si v něm vybudovala pozici, která se odráží v podpoře týmů i nejrůznějších závodů jako například:<ul><li>technický partner evropských jachtařských lig,</li><li>partner největší jachtařské regaty na světě Kieler Woche,</li><li>technický partner Sailing Champions League,</li><li>titulární sponsor mistrovství světa SAP 5O5,</li><li>oficiální technologický partner asociace WORLD SAILING.</li></ul>
