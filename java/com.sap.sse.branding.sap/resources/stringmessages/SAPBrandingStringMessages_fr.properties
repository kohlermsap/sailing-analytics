welcomeToSailingAnalytics=Bienvenue dans SAP Sailing Analytics
welcomeToSailingAnalyticsBody=Grâce aux solutions SAP, l''action sur l''eau est à portée de main pour les amateurs de la voile, comme jamais auparavant.\ Le palmarès actualisé en direct ajoute un vrai plus, avec des classements, vitesses de bateaux et marges de victoire en temps réel. Avec SAP, suivez chaque course et ne ratez aucune manœuvre de passage.\ Regarder les compétitions de voile en direct où que vous soyez devient un jeu d''enfant.
inSailingContent=Pour SAP, la voile est une plate-forme idéale pour présenter des solutions et permettre à la discipline d''atteindre une autre dimension. L''engagement de SAP dans cette discipline a transformé l''expérience de la voile grâce à des outils qui :<ul><li>aident les compétiteurs à analyser leur performance et à optimiser leur stratégie</li><li>rapprochent les amateurs du feu de l''action</li><li>mettent à disposition des médias des informations et des analyses permettant d''étoffer les commentaires qui accompagnent les manifestations</li></ul>L''engagement de SAP dans le sport de la voile est de longue date, porte sur de nombreuses équipes et régates avec un portefeuille élargi qui comprend :<ul><li>Partenaire technologique de la Ligue Européenne de Voile</li><li>Partenaire de la régate la plus grande au monde, Kieler Woche (semaine de Kiel)</li><li>Partenaire technologique de la Sailing Champions League</li><li>Sponsor principal de la compétition SAP 5O5 World Championships</li><li>Partenaire technologique officiel de WORLD SAILING</li></ul>
